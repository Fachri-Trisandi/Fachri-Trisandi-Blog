<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Layered Architecture dan Monolith</title>
  <desc id="desc">Perbandingan arsitektur berlapis dengan aplikasi monolith.</desc>
  <rect width="960" height="540" fill="#fff8f2"/>
  <circle cx="132" cy="122" r="92" fill="#bf5061" opacity=".12"/>
  <circle cx="826" cy="430" r="112" fill="#4f7b60" opacity=".12"/>
  <text x="148" y="88" fill="#76263a" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">Layered</text>
  <text x="628" y="88" fill="#76263a" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">Monolith</text>
  <g>
