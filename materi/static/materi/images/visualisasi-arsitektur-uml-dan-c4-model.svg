  <rect x="566" y="220" width="80" height="58" rx="14" fill="#bf5061"/>
  <rect x="670" y="220" width="80" height="58" rx="14" fill="#76263a"/>
  <rect x="616" y="304" width="92" height="42" rx="14" fill="#fffdfc" stroke="#ead8d3" stroke-width="4"/>
