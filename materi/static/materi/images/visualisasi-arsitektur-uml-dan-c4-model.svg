<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Visualisasi Arsitektur UML dan C4 Model</title>
  <desc id="desc">Papan diagram berisi UML class diagram dan C4 container diagram.</desc>
  <rect width="960" height="540" fill="#fff8f2"/>
  <circle cx="150" cy="104" r="92" fill="#bf5061" opacity=".12"/>
  <circle cx="816" cy="432" r="118" fill="#4f7b60" opacity=".12"/>
  <rect x="96" y="74" width="768" height="392" rx="34" fill="#fffdfc" stroke="#ead8d3" stroke-width="8"/>
  <text x="144" y="136" fill="#76263a" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">UML Class</text>
  <text x="584" y="136" fill="#76263a" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">C4 Model</text>
  <g fill="#fff8f2" stroke="#bf5061" stroke-width="5">
